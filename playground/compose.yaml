name: superset-telegram-playground

x-superset-common: &superset-common
  image: superset-playground:6.1.0
  environment:
    SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    SUPERSET_SECRET_KEY: playground-dev-secret-change-me
  volumes:
    - ./superset_config.py:/app/pythonpath/superset_config.py:ro

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superset"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Builds the shared superset-playground image once; other Superset services
  # reference the resulting tag (avoids a parallel-build race on the same image).
  superset-init:
    <<: *superset-common
    build:
      context: .
      dockerfile: superset.Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./seed:/seed:ro
    entrypoint: ["bash", "/seed/init.sh"]

  superset:
    <<: *superset-common
    depends_on:
      superset-init: {condition: service_completed_successfully}
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  superset-worker:
    <<: *superset-common
    depends_on:
      superset-init: {condition: service_completed_successfully}
    command: ["celery", "--app=superset.tasks.celery_app:app", "worker", "-O", "fair", "-l", "INFO"]

  superset-beat:
    <<: *superset-common
    depends_on:
      superset-init: {condition: service_completed_successfully}
    # Schedule file goes to /tmp; the superset user can't write /app's working dir.
    command: ["celery", "--app=superset.tasks.celery_app:app", "beat", "-l", "INFO", "-s", "/tmp/celerybeat-schedule"]

  superset-seed:
    <<: *superset-common
    depends_on:
      superset: {condition: service_healthy}
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./seed:/seed:ro
    entrypoint: ["python", "/seed/seed.py"]

  bridge:
    build:
      context: ..
      dockerfile: playground/bridge.dev.Dockerfile
    env_file: .env
    # Debug logging so `docker compose logs bridge` prints each inbound payload.
    environment:
      LOG_LEVEL: debug
    expose:
      - "8080"
