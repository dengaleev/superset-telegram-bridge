version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      go-deps:
        patterns:
          - "*"

  # GitHub Actions used in CI and release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  # Base image for the released container.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build

  # Base images used by the local playground.
  - package-ecosystem: docker
    directory: /playground
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      playground-images:
        patterns:
          - "*"
