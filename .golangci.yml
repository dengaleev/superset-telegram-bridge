version: "2"

linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-strings
        - name: error-return
        - name: context-as-argument
        - name: indent-error-flow
  exclusions:
    rules:
      # Test files may use long, descriptive names and skip some checks.
      - path: _test\.go
        linters:
          - unparam

formatters:
  enable:
    - gofumpt
    - goimports
